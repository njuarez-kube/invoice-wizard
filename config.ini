[server]
# Address to bind. Use 127.0.0.1 for local-only access.
# Use 0.0.0.0 to expose on the network (required for external server).
host = 0.0.0.0

# TCP port. Change if 8080 is already in use.
port = 8080

# Auto-open the browser when starting locally. Set to false on a server.
open_browser = true

[paths]
# All paths are relative to this config file, or use absolute paths.

# Folder containing vendor JSON configs (one file per supplier).
vendors_dir = vendors

# Excel output file (created from template on first run).
output = output/gastos.xlsx

# Excel template — the Facturas Kube workbook used as the base.
template = Facturas Kube.xlsx

# Processed PDFs are NOT moved automatically in web mode.
# They stay in the browser session. This folder is kept for legacy CLI use.
done_dir = done

[update]
# GitHub repo in "owner/repo-name" format. Used to check for new versions.
# Leave blank to disable update checks.
github_repo = njuarez-kube/invoice-wizard

[gdrive]
# Service account key file (relative to this config or absolute path).
# Included in the ZIP distributed to users — keep it out of git.
token = token.json

# Google Drive folder ID containing the shared vendor JSON configs.
folder_id = 1p09yoIm9zXDZT9WwGce2tsEv39XuS0rV
