<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice Processor</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header>
  <div class="header-inner">
    <h1>Invoice Processor</h1>
    <nav>
      <a href="/" class="nav-link active">Dashboard</a>
      <a href="/setup" class="nav-link">Add Vendor</a>
    </nav>
  </div>
</header>

<main>
  <!-- Upload zone -->
  <section class="card" id="upload-section">
    <h2>Upload Invoices</h2>
    <div id="drop-zone" class="drop-zone">
      <p>Drag &amp; drop PDF invoices here</p>
      <p class="hint">or <label for="file-input" class="link-btn">browse files</label></p>
      <input type="file" id="file-input" accept=".pdf" multiple hidden>
    </div>
    <div id="file-list" class="file-list hidden"></div>
    <button id="extract-btn" class="btn btn-primary hidden">Extract Data</button>
  </section>

  <!-- Preview table -->
  <section class="card hidden" id="preview-section">
    <div class="section-header">
      <h2>Extracted Data <span id="row-count" class="badge"></span></h2>
      <div class="actions">
        <button id="write-btn" class="btn btn-success">Write to Excel</button>
        <a id="download-link" href="/api/excel" class="btn btn-outline" download="gastos.xlsx">Download Excel</a>
        <button id="reset-btn" class="btn btn-outline" style="color:var(--red);border-color:var(--red)">Reset Excel</button>
      </div>
    </div>
    <div class="table-wrap">
      <table id="preview-table">
        <thead>
          <tr>
            <th><input type="checkbox" id="select-all" title="Select all" checked style="cursor:pointer;width:16px;height:16px"></th>
            <th>File</th>
            <th>Invoice #</th>
            <th>Date</th>
            <th>€ VAT inc</th>
            <th>VAT Return.</th>
            <th>€ excl</th>
            <th>To/From</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="preview-body"></tbody>
      </table>
    </div>
    <div id="write-result" class="result-msg hidden"></div>
  </section>
</main>

<script src="/static/app.js"></script>
</body>
</html>
